<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koneksi Terputus | CashFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            500: '#10b981',
                            600: '#059669',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        body { font-family: 'Outfit', sans-serif; }
        .pulse-emerald {
            animation: pulse-emerald 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-emerald {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .7; transform: scale(1.05); }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen flex items-center justify-center p-6 text-center">
    <div class="max-w-sm w-full space-y-8 animate-in fade-in zoom-in duration-500">
        <!-- Logo -->
        <div class="relative inline-block">
            <div class="absolute inset-0 bg-emerald-500/20 blur-3xl rounded-full scale-150"></div>
            <img src="logo1.png" alt="CashFlow" class="h-24 mx-auto relative z-10 drop-shadow-2xl">
        </div>

        <!-- Offline Message -->
        <div class="space-y-3">
            <div id="lang-id">
                <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Koneksi Terputus</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                    Sepertinya perangkat Anda tidak terhubung ke internet. <br>
                    Silakan cek koneksi Wi-Fi atau data seluler Anda.
                </p>
            </div>
            <div id="lang-en" class="hidden">
                <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Connection Lost</h1>
                <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                    It looks like your device is not connected to the internet. <br>
                    Please check your Wi-Fi or mobile data.
                </p>
            </div>
        </div>

        <!-- Visual Indicator -->
        <div class="flex justify-center gap-1.5 py-4">
            <div class="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-700 animate-bounce [animation-delay:-0.3s]"></div>
            <div class="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-700 animate-bounce [animation-delay:-0.15s]"></div>
            <div class="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-700 animate-bounce"></div>
        </div>

        <!-- Actions -->
        <div class="pt-4">
            <button onclick="window.location.reload()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-3xl shadow-xl shadow-emerald-500/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 119.506 5.068 1 1 0 011.188 1.61 9.002 9.002 0 10-11.232-6.307L4.414 5.5l1.293 1.293a1 1 0 010 1.414l-2 2a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L3.5 8.586V3a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                <span id="btn-id">Coba Hubungkan Kembali</span>
                <span id="btn-en" class="hidden">Try Reconnecting</span>
            </button>
            <p class="mt-6 text-xs text-slate-400 dark:text-slate-600 uppercase font-black tracking-widest">
                OFFLINE MODE | CASHFLOW
            </p>
        </div>
    </div>

    <!-- Auto-reload script when internet is back -->
    <script>
        // Language detection logic
        function applyLanguage() {
            // Priority: LocalStorage -> Navigator Language -> Default (ID)
            const savedLocale = localStorage.getItem('locale');
            const browserLocale = navigator.language || navigator.userLanguage;
            const locale = savedLocale || (browserLocale.startsWith('id') ? 'id' : 'en');

            if (locale === 'en') {
                document.getElementById('lang-id').classList.add('hidden');
                document.getElementById('btn-id').classList.add('hidden');
                document.getElementById('lang-en').classList.remove('hidden');
                document.getElementById('btn-en').classList.remove('hidden');
            }
        }

        applyLanguage();

        window.addEventListener('online', () => {
            window.location.reload();
        });
        
        // Simple dark mode toggle sync if user changes system preference while offline
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
